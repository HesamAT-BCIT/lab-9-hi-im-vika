<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <script>
    const token = "{{ jwt_token }}";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>

<body>
    <h1>Welcome, {{ first_name }}</h1>
    <p>Use the navigation below to manage your profile.</p>

    <ul>
        <li><a href="{{ url_for('profile.profile') }}">Create/Update Profile</a></li>
        <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
    </ul>

    <div class="chart-container">
        <canvas id="sensorChart"></canvas>
    </div>
</body>

<script>
let chart = null;  // hold chart instance outside so we can update it

async function updateChart() {
  try {
    const response = await fetch('/api/sensor_data', {
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    if (!response.ok) {
      throw new Error(`Error: ${response.status}`);
    }

    const sensorData = await response.json();

    const labels      = sensorData.map(d => new Date(d.timestamp));
    const temperature = sensorData.map(d => d.temperature);
    const humidity    = sensorData.map(d => d.humidity);

    if (chart === null) {
      // ✅ First load — create the chart
      chart = new Chart(document.getElementById('sensorChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Temperature (°C)',
              data: temperature,
              borderColor: 'rgb(255, 99, 132)',
              backgroundColor: 'rgba(255, 99, 132, 0.1)',
              tension: 0.3,
              fill: true,
              pointRadius: 4,
              pointHoverRadius: 6,
              yAxisID: 'yTemp'
            },
            {
              label: 'Humidity (%)',
              data: humidity,
              borderColor: 'rgb(54, 162, 235)',
              backgroundColor: 'rgba(54, 162, 235, 0.1)',
              tension: 0.3,
              fill: true,
              pointRadius: 4,
              pointHoverRadius: 6,
              yAxisID: 'yHumidity'
            }
          ]
        },
        options: {
          responsive: true,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: { position: 'top' },
            title: {
              display: true,
              text: 'Temperature & Humidity Over Time'
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                tooltipFormat: 'MMM d, HH:mm',
                displayFormats: {
                  hour: 'HH:mm',
                  day: 'MMM d'
                }
              },
              title: { display: true, text: 'Time' },
              grid: { color: 'rgba(0,0,0,0.05)' }
            },
            yTemp: {
              type: 'linear',
              position: 'left',
              title: { display: true, text: 'Temperature (°C)' },
              grid: { color: 'rgba(255, 99, 132, 0.15)' },
              ticks: { color: 'rgb(255, 99, 132)' }
            },
            yHumidity: {
              type: 'linear',
              position: 'right',
              title: { display: true, text: 'Humidity (%)' },
              grid: { drawOnChartArea: false },
              ticks: { color: 'rgb(54, 162, 235)' },
              min: 0,
              max: 100
            }
          }
        }
      });

    } else {
      // ✅ Subsequent polls — update data in place, no canvas recreation
      chart.data.labels        = labels;
      chart.data.datasets[0].data = temperature;
      chart.data.datasets[1].data = humidity;
      chart.update();
    }

  } catch (error) {
    console.error('Error fetching sensor data:', error);
  }
}

updateChart();                        // run immediately on page load
setInterval(updateChart, 5000);       // then poll every 5 seconds

</script>

</html>
